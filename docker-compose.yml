services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: decksy-app
    restart: always
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=file:./dev.db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEN_API_KEY=${GEN_API_KEY}
      - GEN_API_MODEL=${GEN_API_MODEL:-deepseek-v4-flash}
      - JWT_SECRET=${JWT_SECRET}
      - APP_URL=${APP_URL}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
    volumes:
      - decksy-db:/app/prisma
    networks:
      - app-network

  caddy:
    image: caddy:2-alpine
    container_name: decksy-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - app-network

volumes:
  decksy-db:
    driver: local
  caddy_data:
  caddy_config:

networks:
  app-network:
    driver: bridge
